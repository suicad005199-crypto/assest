<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sports Prediction System</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    width: 200px;
}

button {
    padding: 12px 16px;
    background: #00c853;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.85;
}

.good { color: #00e676; }
.bad { color: #ff5252; }
.warn { color: #ffd54f; }

hr {
    border: 0.5px solid #333;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>AI Sports Prediction System</h2>

        <input id="home" placeholder="Home Team" value="Team A">
        <input id="away" placeholder="Away Team" value="Team B">
        <input id="odds" placeholder="Home Odds" value="2.0">

        <br><br>

        <button onclick="runPrediction()">Run AI Analysis</button>
    </div>

    <div class="card" id="result">
        Results will appear here...
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
